<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Energy Points Connection</title>

<style>
/* Compatible code version for three.js r71 written by ppruvost github.com */
body {
    margin: 0;
    overflow: hidden; /* Empêche le scroll de la page */
    background-color: #BD786C;
    font-family: monospace;
}
#pointLabel {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: left center;
    background: transparent;
    color: #3a2d27;
    font-family: Arial, sans-serif;
    white-space: nowrap;
    z-index: 9999;
    pointer-events: none;
   /* display: none; Masquer par défaut */
}
.point-name { font-weight: bold; font-size:18px; }
</style>
</head>

<body>

<div id="pointLabel"></div>

<script src="three/build/three.js"></script>
<script src="three/loaders/OBJLoader.js"></script>
<script src="three/controls/OrbitControls.js"></script>
<script src="js/acu_point.js"></script>
<script src="js/precomputeMeridians.js"></script>

<script>

/* ================= GLOBAL ================= */

var container, camera, scene, renderer, controls;
var raycaster = new THREE.Raycaster();
var mouse = new THREE.Vector2();
var clickableObjects = [];
var bodyMesh = null;
var cameraOffsetX = 0;
var cameraOffsetZ = 45;
var lastSelectedPoint = null;
var curvesData = {};
var sphereGeometry = new THREE.SphereGeometry(0.3,16,16);
var targetPosition = new THREE.Vector3();
var isMoving = false;

/* ================= COLORS ================= */

function getMeridianColor(meridian) {
const colors = {

    // 🌳 BOIS
    "Foie": 0x1B5E20,
    "Foie-r": 0x2E7D32,
    "Vesicule Biliaire": 0x43A047,
    "Vesicule Biliaire-r": 0x66BB6A,

    // 🔥 FEU IMPERIAL
    "Cœur": 0xB71C1C,
    "Cœur-r": 0xE53935,
    "Intestin Grele": 0xD84315,
    "Intestin Grele-r": 0xFF7043,

    // 🔥 FEU MINISTRE
    "Péricarde": 0x880E4F,
    "Péricarde-r": 0xC2185B,
    "Triple Réchauffeur": 0xE65100,
    "Triple Réchauffeur-r": 0xFB8C00,

    // 🌍 TERRE
    "Rate": 0x9E7D0A,
    "Rate-r": 0xFBC02D,
    "Estomac": 0xF9A825,
    "Estomac-r": 0xFFD54F,

    // ⚙️ METAL
    "Poumon": 0xB0BEC5,
    "Poumon-r": 0xECEFF1,
    "Gros Intestin": 0x90A4AE,
    "Gros Intestin-r": 0xCFD8DC,

    // 💧 EAU
    "Rein": 0x0D47A1,
    "Rein-r": 0x1976D2,
    "Vessie": 0x1565C0,
    "Vessie-r": 0x42A5F5,

    // ☯️ VAISSEAUX EXTRAORDINAIRES
    "Vaisseau Conception": 0x7B1FA2,
    "Vaisseau Gouverneur": 0x4A148C
};

return colors[meridian] || 0xffffff;
}

/* ================= POINTS ================= */

function createPointMesh(point) {
    const material = new THREE.MeshLambertMaterial({
        color: getMeridianColor(point.meridian)
    });

    const mesh = new THREE.Mesh(sphereGeometry, material);
    mesh.name = point.name;
    mesh.position.set(point.x, point.y, point.z);
    mesh.meridian = point.meridian;
    mesh.view = point.view || 0;
    mesh.originalColor = material.color.getHex();

    scene.add(mesh);
    clickableObjects.push(mesh);
}

/* ================= INIT ================= */

function init() {

    container = document.createElement('div');
    document.body.appendChild(container);

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.5, 2000);
    camera.position.z = 250;

    controls = new THREE.OrbitControls(camera);
    controls.enableRotate = true;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.enableDamping = true;       // rotation fluide
    controls.dampingFactor = 0.08;

    controls.rotateSpeed = 0.8;
    controls.zoomSpeed = 1.2;
    controls.panSpeed = 0.8;

    controls.minDistance = 40;           // limite zoom proche
    controls.maxDistance = 600;          // limite zoom loin

    controls.target.set(0, 0, 0);        // centre du modèle
    controls.update();

    /* Ombre sur le corps*/
    scene.add(new THREE.AmbientLight(0x101030));

    const d1 = new THREE.DirectionalLight(0xffeedd);
    d1.position.set(0,0,1);
    scene.add(d1);

    const d2 = new THREE.DirectionalLight(0xffeedd);
    d2.position.set(0,0,-1);
    scene.add(d2);

    /* Points */   
    ACU_POINTS.forEach(p => createPointMesh(p));

    /* Meridian Lines */
    buildMeridianCurves(scene);

    /* OBJ */
    const loaderObj = new THREE.OBJLoader();
    loaderObj.load('three/modelo/corpo.obj', obj => {
        obj.position.y = -95;
        bodyMesh = obj;
        scene.add(obj);
    });

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0xBD786C);
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    window.addEventListener('resize', onWindowResize);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('click', onMouseClick);
  
}

/* ================= EVENTS ================= */

function onWindowResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function onMouseMove(event) {
    mouse.x = (event.clientX/window.innerWidth)*2-1;
    mouse.y = -(event.clientY/window.innerHeight)*2+1;
}
/*===== display Label with MouseClick =====*/
function onMouseClick(event) {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(clickableObjects);

    if(!intersects.length) return;

    const selected = intersects[0].object;

    updatePointLabel(selected);

    if(lastSelectedPoint)
        lastSelectedPoint.material.color.setHex(lastSelectedPoint.originalColor);

    selected.material.color.setHex(0xffff00);
    lastSelectedPoint = selected;

    focusOnPoint(selected);
    // Redirection automatique si le nom se termine par "-r"
    let pointName = selected.name.replace(/-r$/, '');

    openSubMenu(pointName);
}

function focusOnPoint(object) {

    const target = object.position.clone();
    const distance = 25;

    const direction = target.clone().normalize();
    const newCameraPos = target.clone().add(direction.multiplyScalar(distance));

    const startPos = camera.position.clone();
    const startTarget = controls.target.clone();

    let t = 0;

    function animateMove() {
        t += 0.05;

        if (t >= 1) t = 1;

        // interpolation position caméra
        camera.position.lerpVectors(startPos, newCameraPos, t);

        // interpolation cible
        controls.target.lerpVectors(startTarget, target, t);

        controls.update();

        if (t < 1) {
            requestAnimationFrame(animateMove);
        }
    }

    animateMove();
}

/* ==========Print Label ================= */ 
function updatePointLabel(selected) {
    const label = document.getElementById("pointLabel");
    label.innerHTML = `
        <span class="point-name">${selected.name.replace(/-r$/, '').toUpperCase()}</span>
        <span class="copyright">© bien-etre-geobiologie.fr</span>
    `;
}

/* ================= MENU ================= */
function openSubMenu(pointName){

    // envoie l’info à index.html
    window.parent.postMessage({
        type: "selectPoint",
        point: pointName
    }, "*");

}

/* ================= LOOP ================= */

function animate(){
    requestAnimationFrame(animate);
    render();
}

function render(){

    controls.update();
    renderer.render(scene,camera);
}
/* ================= RECEPTION MENU ================= */

window.addEventListener("message", function(event){

    if(event.data.type === "focusPoint"){

        const pointName = event.data.point;

        const target = clickableObjects.find(obj => 
            obj.name.replace(/-r$/, '').toLowerCase() === pointName.toLowerCase()
        );

        if(!target) return;

        if(lastSelectedPoint)
            lastSelectedPoint.material.color.setHex(lastSelectedPoint.originalColor);

        target.material.color.setHex(0xffff00);
        lastSelectedPoint = target;

        updatePointLabel(target);
        focusOnPoint(target);
    }

});

/* ================= START ================= */

init();
animate();

</script>
</body>
</html>
